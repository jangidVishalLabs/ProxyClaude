services:
  postgres:
    image: postgres:16-alpine
    container_name: proxyclaude-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-proxyclaude}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-proxyclaude}
      POSTGRES_DB: ${POSTGRES_DB:-proxyclaude}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - proxyclaude_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-proxyclaude}']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  proxyclaude_pgdata:
